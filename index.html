<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PORSCHE GENETIC CUP | PRO SIMULATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --porsche-red: #cc0000; --gold: #b2967d; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }

        /* HUD & UI */
        #game-ui { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a20 0%, #000 100%); pointer-events: all; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .logo-container { text-align: center; margin-bottom: 40px; }
        .porsche-text { font-family: 'Orbitron'; font-weight: 900; font-size: 3rem; letter-spacing: 15px; text-transform: uppercase; }
        .porsche-sub { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; margin-top: 10px; }

        .form-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 4px; width: 90%; max-width: 450px; backdrop-filter: blur(20px); }
        select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Orbitron'; margin-bottom: 25px; cursor: pointer; }
        .btn-start { background: var(--porsche-red); color: #fff; border: none; padding: 20px; width: 100%; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; letter-spacing: 3px; transition: 0.3s; }
        .btn-start:hover { background: #ff0000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(204,0,0,0.3); }

        /* HUD JOGO */
        #hud-top { position: fixed; top: 30px; left: 30px; display: none; pointer-events: none; }
        .hud-card { background: rgba(0,0,0,0.6); padding: 15px 25px; border-left: 4px solid var(--porsche-red); font-family: 'Orbitron'; }
        
        #speedometer { position: fixed; bottom: 40px; right: 40px; text-align: right; display: none; }
        .speed-val { font-size: 5rem; font-weight: 900; font-family: 'Orbitron'; color: var(--porsche-red); line-height: 0.8; }

        /* MOBILE CONTROLS */
        #ctrl-layer { position: fixed; bottom: 40px; left: 40px; display: none; gap: 20px; pointer-events: all; }
        .ctrl-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.1s; }
        .ctrl-btn:active { background: var(--porsche-red); transform: scale(0.9); }

        /* QUESTÕES */
        #q-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; pointer-events: all; }
        .q-content { background: #000; border: 1px solid #222; border-top: 6px solid var(--porsche-red); padding: 40px; width: 100%; max-width: 600px; }
        .q-opt { border: 1px solid #333; padding: 20px; margin-top: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; transition: 0.3s; }
        .q-opt:hover { border-color: var(--gold); background: #0a0a0a; }
    </style>
</head>
<body>

<div id="game-ui">
    <!-- MENU -->
    <div id="screen-menu" class="screen">
        <div class="logo-container">
            <div class="porsche-text">Porsche</div>
            <div class="porsche-sub">Genetic Championship</div>
        </div>
        <div class="form-box">
            <select id="driver-name">
                <option value="">-- IDENTIFIQUE O PILOTO --</option>
                <option value="NICOLAS PENTEADO">NICOLAS PENTEADO (9º B)</option>
                <option value="YURI GABRIEL">YURI GABRIEL (9º A)</option>
            </select>
            <button class="btn-start" onclick="startGame()">START ENGINE</button>
        </div>
    </div>

    <!-- HUD EM JOGO -->
    <div id="hud-top">
        <div class="hud-card">
            <div id="txt-check" style="font-size: 0.7rem; color: var(--gold);">CHECKPOINT 01/10</div>
            <div id="txt-score" style="font-size: 1.2rem;">PONTOS: 0000</div>
        </div>
    </div>

    <div id="speedometer">
        <div class="speed-val" id="kmh">0</div>
        <div style="font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 5px;">KM/H</div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="ctrl-layer">
        <div class="ctrl-btn" id="btn-L">◀</div>
        <div class="ctrl-btn" id="btn-R">▶</div>
    </div>

    <!-- QUESTÕES -->
    <div id="q-modal">
        <div class="q-content">
            <div style="font-family: 'Orbitron'; color: var(--gold); font-size: 0.6rem; margin-bottom: 10px;">ANÁLISE DO SISTEMA GENÉTICO</div>
            <h2 id="q-title" style="margin-bottom: 30px; line-height: 1.4;"></h2>
            <div id="q-options"></div>
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

    /** 
     * 🟢 LÓGICA DE DADOS (9º ANO - GENÉTICA)
     */
    const DB = [
        {q:"Qual organela é o centro de controle genético da célula?", a:["Citoplasma", "Núcleo", "Ribossomo"], c:1},
        {q:"A estrutura da molécula de DNA é chamada de:", a:["Cadeia Simples", "Hélice Tripla", "Dupla Hélice"], c:2},
        {q:"A base nitrogenada que se liga à Citosina (C) é a:", a:["Guanina (G)", "Adenina (A)", "Timina (T)"], c:0},
        {q:"Quantos cromossomos existem nas células somáticas humanas?", a:["23", "46", "92"], c:1},
        {q:"O que é um gene?", a:["Uma proteína do sangue", "Fragmento de DNA com instrução proteica", "Uma célula nervosa"], c:1},
        {q:"Qual açúcar compõe o nucleotídeo do DNA?", a:["Glicose", "Ribose", "Desoxirribose"], c:2},
        {q:"A base Uracila (U) é encontrada apenas no:", a:["DNA", "RNA", "Cromossomo"], c:1},
        {q:"A união dos gametas (óvulo e espermatozoide) resulta no:", a:["Zigoto", "Gene", "Alelo"], c:0},
        {q:"A Foto 51 de Rosalind Franklin foi obtida por:", a:["Laser", "Raios-X", "Microscópio"], c:1},
        {q:"Hereditariedade é a transmissão de genes para:", a:["Os vizinhos", "Os pais", "Os descendentes"], c:2}
    ];

    /** 
     * 🏎️ ENGINE DO SIMULADOR (THREE.JS)
     */
    let scene, camera, renderer, playerCar;
    let opponents = [];
    let gameRunning = false, paused = false;
    let currentQ = 0, score = 0;

    const input = { up: 0, left: 0, right: 0, down: 0 };
    const carStats = { speed: 0, angle: 0, x: 380, z: 0, accel: 0.03, friction: 0.985, max: 4.8, steer: 0.04, tilt: 0 };

    window.startGame = () => {
        if(!document.getElementById('driver-name').value) return alert("Selecione um Piloto!");
        document.getElementById('screen-menu').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('hud-top').style.display = 'block';
            document.getElementById('speedometer').style.display = 'block';
            document.getElementById('ctrl-layer').style.display = 'flex';
            initEngine();
            gameRunning = true;
            animate();
        }, 800);
    };

    function initEngine() {
        // CENA & CÂMERA
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.Fog(0x0a0a0c, 100, 1000);

        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ILUMINAÇÃO DE ALTO NÍVEL
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 200, 100);
        sun.castShadow = true;
        sun.shadow.camera.left = -500;
        sun.shadow.camera.right = 500;
        scene.add(sun);

        createCircuit();
        playerCar = createProfessionalCar(0xcc0000); // Porsche Vermelho do Jogador
        scene.add(playerCar);

        // Grid de Largada (IA)
        const colors = [0x0055ff, 0xffbb00, 0x444444];
        for(let i=0; i<3; i++) {
            const opp = createProfessionalCar(colors[i]);
            opp.userData = { angle: (i+1)*0.1, speed: 2.0 + Math.random() };
            opponents.push(opp);
            scene.add(opp);
        }

        setupControls();
    }

    /** 
     * 🛠️ FABRICAÇÃO DO PORSCHE (SINTAXE AVANÇADA THREE.JS)
     */
    function createProfessionalCar(hexColor) {
        const carGroup = new THREE.Group();

        // MATERIAIS DE ALTO BRILHO (Metálico)
        const paint = new THREE.MeshPhysicalMaterial({
            color: hexColor, metalness: 0.9, roughness: 0.1,
            clearcoat: 1.0, clearcoatRoughness: 0.02
        });

        const black = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.8 });
        
        // Chassis (Base)
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(6, 1.2, 14), paint);
        chassis.position.y = 1.0;
        chassis.castShadow = true;
        carGroup.add(chassis);

        // Cockpit (Teto Porsche Style)
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, 7), paint);
        cockpit.position.set(0, 2.2, -1);
        carGroup.add(cockpit);

        // Capô Curvo (Uso de Cylinder para Aerodinâmica)
        const nose = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 5, 32), paint);
        nose.rotation.z = Math.PI / 2;
        nose.position.set(0, 1.1, 5.5);
        nose.scale.set(0.6, 1.1, 1.2);
        carGroup.add(nose);

        // Vidros (Transparência Física)
        const glass = new THREE.Mesh(new THREE.BoxGeometry(4.8, 1.2, 6.5), 
            new THREE.MeshPhysicalMaterial({ color: 0x000000, transmission: 0.9, transparent: true, opacity: 0.4 })
        );
        glass.position.set(0, 2.3, -0.8);
        carGroup.add(glass);

        // Rodas (Cilindros com Detalhes)
        const wheelGeo = new THREE.CylinderGeometry(1.2, 1.2, 1.0, 32);
        const wPos = [[-3.2, 1.2, 4.5], [3.2, 1.2, 4.5], [-3.2, 1.2, -4.5], [3.2, 1.2, -4.5]];
        wPos.forEach(p => {
            const w = new THREE.Mesh(wheelGeo, black);
            w.rotation.z = Math.PI / 2;
            w.position.set(p[0], 0, p[2]);
            carGroup.add(w);
        });

        // Faróis (Emissivos)
        const lightGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 2 });
        [[-2.2, 1.5, 6.5], [2.2, 1.5, 6.5]].forEach(p => {
            const h = new THREE.Mesh(lightGeo, lightMat);
            h.position.set(p[0], p[1], p[2]);
            carGroup.add(h);
        });

        return carGroup;
    }

    function createCircuit() {
        // Asfalto
        const trackGeo = new THREE.TorusGeometry(380, 50, 16, 100);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x151518, roughness: 1 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        scene.add(track);

        // Zebras (Curbs)
        const curbGeo = new THREE.TorusGeometry(330, 2, 8, 100);
        const curb = new THREE.Mesh(curbGeo, new THREE.MeshBasicMaterial({ color: 0xcc0000 }));
        curb.rotation.x = -Math.PI / 2;
        scene.add(curb);

        // Grama
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x112211 }));
        grass.rotation.x = -Math.PI / 2;
        grass.position.y = -0.5;
        scene.add(grass);

        // Cenário (Prédios)
        for(let i=0; i<50; i++) {
            const angle = (i/50) * Math.PI * 2;
            const dist = 550 + Math.random()*200;
            const h = 20 + Math.random()*100;
            const b = new THREE.Mesh(new THREE.BoxGeometry(30, h, 30), new THREE.MeshStandardMaterial({color: 0x222225}));
            b.position.set(Math.cos(angle)*dist, h/2, Math.sin(angle)*dist);
            scene.add(b);
        }
    }

    /** 
     * ⚙️ LOOP DE PROCESSAMENTO
     */
    function animate() {
        if(!gameRunning) return;
        requestAnimationFrame(animate);

        if(!paused) {
            updateCarPhysics();
            updateOpponents();
            checkCheckpoints();
        }

        renderer.render(scene, camera);
    }

    function updateCarPhysics() {
        // Teclado + Mobile
        if(input.up) carStats.speed += carStats.accel;
        else if(input.down) carStats.speed -= carStats.accel * 2.5;
        else carStats.speed *= carStats.friction;

        carStats.speed = Math.max(-1, Math.min(carStats.speed, carStats.max));

        if(Math.abs(carStats.speed) > 0.1) {
            const dir = carStats.speed > 0 ? 1 : -1;
            if(input.left) {
                carStats.angle += carStats.steer * dir;
                carStats.tilt = THREE.MathUtils.lerp(carStats.tilt, 0.1, 0.1);
            } else if(input.right) {
                carStats.angle -= carStats.steer * dir;
                carStats.tilt = THREE.MathUtils.lerp(carStats.tilt, -0.1, 0.1);
            } else {
                carStats.tilt = THREE.MathUtils.lerp(carStats.tilt, 0, 0.1);
            }
        }

        carStats.x += Math.sin(carStats.angle) * carStats.speed;
        carStats.z += Math.cos(carStats.angle) * carStats.speed;

        playerCar.position.set(carStats.x, 0, carStats.z);
        playerCar.rotation.y = carStats.angle;
        playerCar.rotation.z = carStats.tilt;

        // Câmera Estilo GTA (Chase Cam)
        const camDist = 40;
        const tx = carStats.x - Math.sin(carStats.angle) * camDist;
        const tz = carStats.z - Math.cos(carStats.angle) * camDist;
        camera.position.lerp(new THREE.Vector3(tx, 20, tz), 0.1);
        camera.lookAt(carStats.x, 5, carStats.z);

        document.getElementById('kmh').textContent = Math.round(Math.abs(carStats.speed) * 82);
    }

    function updateOpponents() {
        opponents.forEach((opp, i) => {
            opp.userData.angle += 0.002 * opp.userData.speed;
            const r = 380 + (i*12 - 18);
            opp.position.set(Math.cos(opp.userData.angle)*r, 0, Math.sin(opp.userData.angle)*r);
            opp.rotation.y = -opp.userData.angle + Math.PI/2;
        });
    }

    function checkCheckpoints() {
        const targetAngle = (currentQ / 10) * Math.PI * 2;
        const gx = Math.cos(targetAngle) * 380;
        const gz = Math.sin(targetAngle) * 380;
        const dist = Math.sqrt((carStats.x - gx)**2 + (carStats.z - gz)**2);

        if(dist < 50 && !paused) triggerQuestion();
    }

    function triggerQuestion() {
        paused = true;
        const q = DB[currentQ];
        document.getElementById('q-title').textContent = q.q;
        const container = document.getElementById('q-options');
        container.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'q-opt';
            div.textContent = opt;
            div.onclick = () => {
                if(i === q.c) score += 100;
                currentQ++;
                document.getElementById('q-modal').style.display = 'none';
                document.getElementById('txt-check').textContent = `CHECKPOINT ${currentQ+1}/10`;
                document.getElementById('txt-score').textContent = `PONTOS: ${score}`;
                
                if(currentQ >= 10) {
                    alert("PROVA ENCERRADA! SCORE: " + score);
                    location.reload();
                } else {
                    paused = false;
                    carStats.speed = 2.5; // Impulso N2O
                }
            };
            container.appendChild(div);
        });
        document.getElementById('q-modal').style.display = 'flex';
    }

    function setupControls() {
        window.onkeydown = (e) => {
            if(e.key === 'ArrowUp') input.up = 1;
            if(e.key === 'ArrowDown') input.down = 1;
            if(e.key === 'ArrowLeft') input.left = 1;
            if(e.key === 'ArrowRight') input.right = 1;
        };
        window.onkeyup = (e) => {
            if(e.key === 'ArrowUp') input.up = 0;
            if(e.key === 'ArrowDown') input.down = 0;
            if(e.key === 'ArrowLeft') input.left = 0;
            if(e.key === 'ArrowRight') input.right = 0;
        };

        // Mobile
        const bL = document.getElementById('btn-L');
        const bR = document.getElementById('btn-R');
        bL.ontouchstart = () => input.left = 1; bL.ontouchend = () => input.left = 0;
        bR.ontouchstart = () => input.right = 1; bR.ontouchend = () => input.right = 0;
        // O acelerador no mobile pode ser automático ou clicando na tela
        window.ontouchstart = (e) => { if(e.target.tagName !== 'BUTTON') input.up = 1; };
        window.ontouchend = () => input.up = 0;
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

</script>
</body>
</html>
