<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PORSCHE GENETIC CUP | PRO CIRCUIT 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --gold: #b2967d; --bg: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }

        /* INTERFACE */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #222, #000); pointer-events: all; transition: 0.5s; }
        
        .porsche-title { font-family: 'Orbitron'; font-weight: 900; font-size: 2.5rem; color: #fff; letter-spacing: 12px; margin-bottom: 5px; }
        .sub-title { font-family: 'Orbitron'; color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 30px; }
        
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 4px; width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Orbitron'; margin-bottom: 20px; outline: none; }
        .btn-play { background: var(--red); color: #fff; border: none; padding: 20px; width: 100%; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; letter-spacing: 2px; }

        /* HUD JOGO */
        #hud { position: fixed; top: 20px; left: 20px; color: #fff; font-family: 'Orbitron'; pointer-events: none; display: none; }
        .speedometer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: #fff; pointer-events: none; display: none;}
        .speed-val { font-size: 4rem; font-weight: 900; line-height: 1; color: var(--red); }

        /* CONTROLES MOBILE */
        #controls { position: fixed; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 200; pointer-events: none; }
        .btn-group { display: flex; gap: 15px; pointer-events: all; }
        .btn-ui { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; transition: 0.1s; }
        .btn-ui:active { background: var(--red); }

        /* OVERLAY QUESTÃO */
        #q-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; pointer-events: all; }
        .q-box { background: #000; border-top: 5px solid var(--red); padding: 40px; width: 100%; max-width: 550px; color: #fff; }
        .q-opt { border: 1px solid #222; padding: 20px; margin-top: 15px; cursor: pointer; transition: 0.3s; font-family: 'Orbitron'; font-size: 0.8rem; }
        .q-opt:hover { background: #111; border-color: var(--gold); }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen">
        <div class="porsche-title">PORSCHE</div>
        <div class="sub-title">GENETIC CHAMPIONSHIP</div>
        <div class="card">
            <select id="piloto-select">
                <option value="">-- SELECIONE O PILOTO --</option>
                <option value="NICOLAS PENTEADO">NICOLAS PENTEADO (9º B)</option>
                <option value="YURI GABRIEL">YURI GABRIEL (9º A)</option>
            </select>
            <button class="btn-play" onclick="initGame()">START ENGINE</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="check-info">CHECKPOINT: 1/10</div>
        <div id="score-info" style="color:var(--gold)">PONTOS: 0</div>
    </div>

    <div class="speedometer" id="speed-hud">
        <div class="speed-val" id="kmh">0</div>
        <div style="font-family:'Orbitron'; font-size:0.7rem; letter-spacing:5px;">KM/H</div>
    </div>

    <!-- CONTROLES -->
    <div id="controls">
        <div class="btn-group">
            <div class="btn-ui" id="btn-left">◀</div>
            <div class="btn-ui" id="btn-right">▶</div>
        </div>
        <div class="btn-group">
            <div class="btn-ui" id="btn-brake" style="border-radius:10px;">FREIO</div>
            <div class="btn-ui" id="btn-gas" style="border-radius:10px; background:rgba(255,255,255,0.2)">GAS</div>
        </div>
    </div>

    <!-- QUESTÕES -->
    <div id="q-overlay">
        <div class="q-box">
            <div style="color:var(--gold); font-size:0.6rem; margin-bottom:10px; font-family:'Orbitron';">ANÁLISE GENÉTICA NECESSÁRIA</div>
            <h2 id="q-text" style="margin-bottom:30px; line-height:1.4;"></h2>
            <div id="q-options"></div>
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

    /** ═══════════════════════════════════════════════════════════════
     *  DADOS DAS QUESTÕES
     *  ═══════════════════════════════════════════════════════════════ */
    const QUESTIONS = [
        {q:"Qual molécula carrega a informação genética?", a:["Proteína", "DNA", "Lípídio"], c:1},
        {q:"O formato do DNA é uma...", a:["Esfera", "Hélice Simples", "Dupla Hélice"], c:2},
        {q:"Onde o DNA fica guardado na célula?", a:["Núcleo", "Citoplasma", "Membrana"], c:0},
        {q:"Qual base se liga com a Adenina (A)?", a:["Citosina", "Guanina", "Timina"], c:2},
        {q:"Quantos cromossomos tem uma célula humana?", a:["23", "46", "92"], c:1},
        {q:"A base Uracila (U) é exclusiva de qual molécula?", a:["DNA", "RNA", "Glicose"], c:1},
        {q:"O conjunto de genes de um indivíduo é o:", a:["Cariótipo", "Fenótipo", "Genótipo"], c:2},
        {q:"O que é um gene?", a:["Um tipo de célula", "Segmento de DNA com instrução", "Uma organela"], c:1},
        {q:"A técnica da 'Foto 51' usou qual tecnologia?", a:["Raios-X", "Laser", "Ultra-som"], c:0},
        {q:"A transmissão de genes para filhos chama-se:", a:["Evolução", "Mitose", "Hereditariedade"], c:2}
    ];

    /** ═══════════════════════════════════════════════════════════════
     *  CONFIGURAÇÕES DE JOGO
     *  ═══════════════════════════════════════════════════════════════ */
    let scene, camera, renderer, playerCar;
    let opponents = [];
    let gameActive = false;
    let paused = false;
    let currentQ = 0, score = 0;
    
    const input = { up:0, down:0, left:0, right:0 };
    const carPhys = { speed:0, angle:0, x:360, z:0, accel:0.02, friction:0.98, max:4.5, steer:0.04, tilt:0 };
    
    const TRACK_RADIUS_X = 360;
    const TRACK_RADIUS_Z = 240;

    window.initGame = () => {
        if(!document.getElementById('piloto-select').value) return alert("Selecione seu piloto!");
        document.getElementById('screen-start').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('screen-start').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('speed-hud').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            setupScene();
            gameActive = true;
            animate();
        }, 500);
    };

    /** ═══════════════════════════════════════════════════════════════
     *  FÁBRICA DE CARROS (Incorporando a Sintaxe Solicitada)
     *  ═══════════════════════════════════════════════════════════════ */
    function createCar(colorHex) {
        const carGroup = new THREE.Group();

        // MATERIAIS REALISTAS (Physical)
        const bodyMat = new THREE.MeshPhysicalMaterial({
            color: colorHex, metalness: 0.8, roughness: 0.2,
            clearcoat: 1.0, clearcoatRoughness: 0.03
        });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7 });
        const glassMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x222222, transparent: true, opacity: 0.5, 
            transmission: 0.9, roughness: 0 
        });

        // CORPO PRINCIPAL
        const body = new THREE.Mesh(new THREE.BoxGeometry(5.5, 1.2, 2.4), bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        carGroup.add(body);

        // PARTE SUPERIOR (Cockpit)
        const top = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 2.1), bodyMat);
        top.position.set(-0.5, 1.4, 0);
        top.castShadow = true;
        carGroup.add(top);

        // CAPÔ ARREDONDADO (Lógica solicitada)
        const hood = new THREE.Mesh(
            new THREE.CylinderGeometry(1.2, 1.2, 2.3, 32, 1, false),
            bodyMat
        );
        hood.rotation.z = Math.PI / 2;
        hood.position.set(2.4, 0.6, 0);
        hood.scale.set(0.5, 1, 1);
        carGroup.add(hood);

        // VIDRO
        const glass = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.6, 1.9), glassMat);
        glass.position.set(-0.4, 1.5, 0);
        carGroup.add(glass);

        // RODAS 3D
        const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 32);
        const wheelPos = [[-1.8, 1.3], [1.8, 1.3], [-1.8, -1.3], [1.8, -1.3]];
        wheelPos.forEach(p => {
            const w = new THREE.Mesh(wheelGeo, blackMat);
            w.rotation.z = Math.PI / 2;
            w.position.set(p[0], 0, p[1]);
            carGroup.add(w);
        });

        // FARÓIS (Emissive)
        const lightGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const lightMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 2 
        });
        [[-0.8], [0.8]].forEach(z => {
            const l = new THREE.Mesh(lightGeo, lightMat);
            l.position.set(2.8, 0.8, z);
            carGroup.add(l);
        });

        return carGroup;
    }

    /** ═══════════════════════════════════════════════════════════════
     *  CENÁRIO E CIRCUITO
     *  ═══════════════════════════════════════════════════════════════ */
    function setupScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Céu
        scene.fog = new THREE.Fog(0x87ceeb, 100, 1500);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 3000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // LUZES
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 200, 100);
        sun.castShadow = true;
        scene.add(sun);

        // PISTA REALISTA
        const trackGeo = new THREE.RingGeometry(TRACK_RADIUS_Z-45, TRACK_RADIUS_Z+45, 128);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI/2;
        track.scale.set(TRACK_RADIUS_X/TRACK_RADIUS_Z, 1, 1);
        track.receiveShadow = true;
        scene.add(track);

        // ZEBRAS (Curbs)
        const curbGeo = new THREE.TorusGeometry(TRACK_RADIUS_Z+46, 2, 8, 128);
        const curbMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        const curb = new THREE.Mesh(curbGeo, curbMat);
        curb.rotation.x = -Math.PI/2;
        curb.scale.set(TRACK_RADIUS_X/TRACK_RADIUS_Z, 1, 0.05);
        scene.add(curb);

        // GRAMA E AMBIENTE
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({color: 0x335522}));
        grass.rotation.x = -Math.PI/2;
        grass.position.y = -0.5;
        grass.receiveShadow = true;
        scene.add(grass);

        // ARQUIBANCADA E PRÉDIOS
        for(let i=0; i<30; i++) {
            const angle = (i/30) * Math.PI * 2;
            const r = 500;
            const h = 20 + Math.random() * 50;
            const b = new THREE.Mesh(new THREE.BoxGeometry(40, h, 20), new THREE.MeshStandardMaterial({color: 0x555555}));
            b.position.set(Math.cos(angle)*r*1.5, h/2, Math.sin(angle)*r);
            scene.add(b);
        }

        // CARRO DO JOGADOR
        playerCar = createCar(0xcc0000);
        playerCar.position.set(carPhys.x, 0, carPhys.z);
        scene.add(playerCar);

        // COMPETIDORES (Oponentes)
        const colors = [0x0055ff, 0xffaa00, 0x00cc44];
        for(let i=0; i<3; i++) {
            const opp = createCar(colors[i]);
            opp.userData = { t: i * 0.2, speed: 2.5 + Math.random() };
            opponents.push(opp);
            scene.add(opp);
        }

        setupControls();
    }

    /** ═══════════════════════════════════════════════════════════════
     *  SISTEMA DE CONTROLES
     *  ═══════════════════════════════════════════════════════════════ */
    function setupControls() {
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') input.up = 1;
            if(e.key === 'ArrowDown') input.down = 1;
            if(e.key === 'ArrowLeft') input.left = 1;
            if(e.key === 'ArrowRight') input.right = 1;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp') input.up = 0;
            if(e.key === 'ArrowDown') input.down = 0;
            if(e.key === 'ArrowLeft') input.left = 0;
            if(e.key === 'ArrowRight') input.right = 0;
        });

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); input[key] = 1; };
            el.ontouchend = (e) => { e.preventDefault(); input[key] = 0; };
            el.onmousedown = () => input[key] = 1;
            el.onmouseup = () => input[key] = 0;
        };
        bindBtn('btn-gas', 'up'); bindBtn('btn-brake', 'down');
        bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right');
    }

    /** ═══════════════════════════════════════════════════════════════
     *  LOOP DE ANIMAÇÃO E FÍSICA
     *  ═══════════════════════════════════════════════════════════════ */
    function animate() {
        if(!gameActive) return;
        requestAnimationFrame(animate);

        if(!paused) {
            updatePhysics();
            updateOpponents();
            checkCheckpoints();
        }

        renderer.render(scene, camera);
    }

    function updatePhysics() {
        // Aceleração
        if(input.up) carPhys.speed += carPhys.accel;
        else if(input.down) carPhys.speed -= carPhys.accel * 3;
        else carPhys.speed *= carPhys.friction;

        carPhys.speed = Math.max(-1, Math.min(carPhys.speed, carPhys.max));

        // Direção
        if(Math.abs(carPhys.speed) > 0.1) {
            const steerDir = carPhys.speed > 0 ? 1 : -1;
            if(input.left) {
                carPhys.angle += carPhys.steer * steerDir;
                carPhys.tilt = THREE.MathUtils.lerp(carPhys.tilt, 0.1, 0.1);
            } else if(input.right) {
                carPhys.angle -= carPhys.steer * steerDir;
                carPhys.tilt = THREE.MathUtils.lerp(carPhys.tilt, -0.1, 0.1);
            } else {
                carPhys.tilt = THREE.MathUtils.lerp(carPhys.tilt, 0, 0.1);
            }
        }

        // Movimento
        carPhys.x += Math.cos(carPhys.angle) * carPhys.speed;
        carPhys.z -= Math.sin(carPhys.angle) * carPhys.speed;

        playerCar.position.set(carPhys.x, 0.2, carPhys.z);
        playerCar.rotation.y = carPhys.angle;
        playerCar.rotation.z = carPhys.tilt;

        // Câmera Chase (Seguindo o carro)
        const camDist = 25;
        const targetCamX = carPhys.x - Math.cos(carPhys.angle) * camDist;
        const targetCamZ = carPhys.z + Math.sin(carPhys.angle) * camDist;
        camera.position.lerp(new THREE.Vector3(targetCamX, 12, targetCamZ), 0.1);
        camera.lookAt(carPhys.x, 2, carPhys.z);

        // UI
        document.getElementById('kmh').textContent = Math.round(Math.abs(carPhys.speed) * 85);
    }

    function updateOpponents() {
        opponents.forEach((opp, i) => {
            opp.userData.t += 0.002 * opp.userData.speed;
            const angle = opp.userData.t;
            const x = Math.cos(angle) * (TRACK_RADIUS_X + (i*8 - 12));
            const z = Math.sin(angle) * (TRACK_RADIUS_Z + (i*8 - 12));
            
            // Orientação simples seguindo a pista
            const nextAngle = angle + 0.1;
            const nx = Math.cos(nextAngle) * (TRACK_RADIUS_X + (i*8 - 12));
            const nz = Math.sin(nextAngle) * (TRACK_RADIUS_Z + (i*8 - 12));
            
            opp.position.set(x, 0.2, z);
            opp.lookAt(nx, 0.2, nz);
        });
    }

    function checkCheckpoints() {
        // Gatilho por ângulo da pista
        const carAngle = Math.atan2(-carPhys.z, carPhys.x);
        const targetAngle = ((currentQ / 10) * Math.PI * 2) - Math.PI;
        
        // Distância ao "ponto" do checkpoint
        const gx = Math.cos(targetAngle) * TRACK_RADIUS_X;
        const gz = -Math.sin(targetAngle) * TRACK_RADIUS_Z;
        const dist = Math.sqrt((carPhys.x-gx)**2 + (carPhys.z-gz)**2);

        if(dist < 50 && !paused) {
            showQuestion();
        }
    }

    function showQuestion() {
        paused = true;
        const q = QUESTIONS[currentQ];
        document.getElementById('q-text').textContent = q.q;
        const container = document.getElementById('q-options');
        container.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'q-opt';
            div.textContent = opt;
            div.onclick = () => {
                if(i === q.c) {
                    score += 100;
                    document.getElementById('score-info').textContent = "PONTOS: " + score;
                }
                currentQ++;
                document.getElementById('q-overlay').style.display = 'none';
                document.getElementById('check-info').textContent = `CHECKPOINT: ${currentQ+1}/10`;
                
                if(currentQ >= 10) {
                    alert("CORRIDA CONCLUÍDA! Pontuação: " + score);
                    location.reload();
                } else {
                    paused = false;
                    carPhys.speed = 3; // Boost após responder
                }
            };
            container.appendChild(div);
        });
        document.getElementById('q-overlay').style.display = 'flex';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
