<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PORSCHE GENETIC CUP | REAL 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    :root { --porsche-red: #d5001c; --gold: #b2967d; }
    *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
    body{ width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; touch-action:none; }

    /* TELAS */
    #screen-select, #screen-game, #screen-finish { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #screen-select { background: radial-gradient(circle, #1a1a1f, #000); }
    #screen-game { display:none; pointer-events:none; }
    #screen-finish { background:rgba(0,0,0,0.95); display:none; color:#fff; }

    .porsche-logo { font-family:'Orbitron'; font-weight:900; font-size:2.2rem; letter-spacing:10px; color:#fff; margin-bottom:10px; text-shadow: 0 0 20px rgba(255,255,255,0.2);}
    .glass-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px); padding:40px; border-radius:4px; width:90%; max-width:400px; text-align:center;}
    
    select { width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; margin-bottom:20px; font-family:'Orbitron'; outline:none; appearance: none; }
    .btn-race { background:var(--porsche-red); color:#fff; border:none; padding:18px; width:100%; font-family:'Orbitron'; font-weight:900; cursor:pointer; letter-spacing:2px; transition:0.3s; }
    .btn-race:hover { background:#ff0022; }

    /* HUD */
    #hud { position:fixed; top:20px; left:20px; color:#fff; font-family:'Orbitron'; z-index:50; pointer-events:none;}
    .speed-ui { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); text-align:center; color:#fff; z-index:50; pointer-events:none;}
    .speed-num { font-size:3.5rem; font-weight:900; font-family:'Orbitron'; line-height:1; color: var(--porsche-red);}

    /* CONTROLES */
    #mobile-ctrl { position:fixed; bottom:30px; left:0; right:0; display:flex; justify-content:space-between; padding:0 30px; pointer-events:none; z-index:150;}
    .btn-group { display:flex; gap:15px; pointer-events:all; }
    .btn-ui { width:75px; height:75px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.5rem; transition:0.1s; backdrop-filter:blur(4px); }
    .btn-ui:active { background:var(--porsche-red); transform:scale(0.9); }

    /* QUESTÕES */
    #q-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; z-index:500; padding:20px; }
    .q-box { background:#000; border-top:5px solid var(--porsche-red); padding:35px; width:100%; max-width:550px; color:#fff; }
    .q-opt { border:1px solid #222; padding:18px; margin-top:12px; cursor:pointer; transition:0.2s; font-family:'Orbitron'; font-size:0.8rem;}
    .q-opt:hover { background:#111; border-color:var(--gold); }
    .correct { background: #004411 !important; border-color: #00ff64 !important; }
    .wrong { background: #440000 !important; border-color: #ff0000 !important; }

    canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="screen-select">
    <div class="porsche-logo">PORSCHE</div>
    <div style="color:var(--gold); letter-spacing:5px; font-size:0.6rem; margin-bottom:30px; font-family:'Orbitron';">GENETIC CUP 3D SIMULATOR</div>
    <div class="glass-card">
        <select id="sel-nome">
            <option value="">-- SELECIONE SEU PILOTO --</option>
            <option value="NICOLAS PENTEADO">NICOLAS PENTEADO (9º B)</option>
            <option value="YURI GABRIEL">YURI GABRIEL (9º A)</option>
        </select>
        <button class="btn-race" onclick="startRace()">INICIAR MOTOR</button>
    </div>
</div>

<!-- JOGO -->
<div id="screen-game">
    <div id="hud">
        <div id="hud-q" style="font-size:1rem;">CHECKPOINT: 1/10</div>
        <div id="hud-score" style="color:var(--gold); margin-top:5px;">SCORE: 000</div>
    </div>
    <div class="speed-ui">
        <div class="speed-num" id="spd-val">0</div>
        <div style="letter-spacing:5px; font-size:0.7rem; font-family:'Orbitron';">KM/H</div>
    </div>
    <div id="mobile-ctrl">
        <div class="btn-group">
            <div class="btn-ui" id="k-left">◀</div>
            <div class="btn-ui" id="k-right">▶</div>
        </div>
        <div class="btn-group">
            <div class="btn-ui" id="k-down" style="border-radius:12px; font-size:0.8rem; font-family:'Orbitron';">BRAKE</div>
            <div class="btn-ui" id="k-up" style="border-radius:12px; font-size:0.8rem; font-family:'Orbitron'; background:rgba(255,255,255,0.15);">GAS</div>
        </div>
    </div>
</div>

<!-- QUESTÃO -->
<div id="q-overlay">
    <div class="q-box">
        <div style="color:var(--gold); font-size:0.7rem; margin-bottom:10px; font-family:'Orbitron';">SYSTEM CHECK REQUIRED</div>
        <h2 id="q-txt" style="margin-bottom:25px; font-family:sans-serif; line-height:1.4;"></h2>
        <div id="q-opts"></div>
    </div>
</div>

<!-- FIM -->
<div id="screen-finish">
    <h1 class="porsche-logo">FINISH LINE</h1>
    <div id="fin-res" style="text-align:center; font-family:'Orbitron'; margin:30px 0; font-size:1.2rem;"></div>
    <button class="btn-race" style="width:250px;" onclick="location.reload()">NOVA CORRIDA</button>
</div>

<script>
/** ═══════════════════════════════════════════════════════════════
 *  GAME DATA & PHYSICS
 *  ═══════════════════════════════════════════════════════════════ */
const DB = [
    {q:"Qual parte da célula eucarionte contém o DNA?", a:["Citoplasma", "Núcleo", "Parede Celular"], c:1},
    {q:"A molécula de DNA tem o formato de:", a:["Círculo", "Dupla Hélice", "Escada Reta"], c:1},
    {q:"No DNA, a Citosina (C) sempre se liga com a:", a:["Adenina (A)", "Timina (T)", "Guanina (G)"], c:2},
    {q:"O número de cromossomos em uma célula somática humana é:", a:["23", "46", "92"], c:1},
    {q:"Um segmento de DNA com instruções genéticas é um:", a:["Gene", "Vírus", "Hormônio"], c:0},
    {q:"Qual açúcar está presente no DNA?", a:["Glicose", "Ribose", "Desoxirribose"], c:2},
    {q:"A base nitrogenada Uracila (U) é exclusiva do:", a:["DNA", "RNA", "Proteína"], c:1},
    {q:"O conjunto de todos os genes de uma espécie é o:", a:["Fenótipo", "Genoma", "Cariótipo"], c:1},
    {q:"Quem propôs o modelo de dupla hélice do DNA?", a:["Mendel", "Watson e Crick", "Darwin"], c:1},
    {q:"A união do óvulo com o espermatozoide gera o:", a:["Zigoto", "Gameta", "Embrião"], c:0}
];

let scene, camera, renderer, car, wheels = [];
let keys = { up:0, down:0, left:0, right:0 };
let carPhys = { speed: 0, angle: 0, x: 250, z: 0, accel: 0.015, friction: 0.985, maxSpeed: 4.2 };
let game = { current: 0, score: 0, active: false, paused: false };

function startRace() {
    if(!document.getElementById('sel-nome').value) return alert("SELECIONE UM PILOTO");
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-game').style.display = 'block';
    initThree();
}

/** ═══════════════════════════════════════════════════════════════
 *  CONSTRUÇÃO DO MUNDO 3D (CENÁRIO GTA)
 *  ═══════════════════════════════════════════════════════════════ */
function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Céu azul
    scene.fog = new THREE.Fog(0x87ceeb, 100, 1000);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ILUMINAÇÃO (Garante que nada fique preto)
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(100, 200, 100);
    sun.castShadow = true;
    scene.add(sun);

    createScenario();
    createPorsche();
    setupInput();
    game.active = true;
    loop();
}

function createScenario() {
    // Chão de Grama
    const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(3000, 3000),
        new THREE.MeshStandardMaterial({ color: 0x228b22 })
    );
    grass.rotation.x = -Math.PI/2;
    grass.receiveShadow = true;
    scene.add(grass);

    // Pista de Asfalto (Circular)
    const trackGeo = new THREE.TorusGeometry(250, 45, 16, 100);
    const trackMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
    const track = new THREE.Mesh(trackGeo, trackMat);
    track.rotation.x = -Math.PI/2;
    track.position.y = 0.1;
    scene.add(track);

    // Prédios ao Redor (Estilo Cidade)
    for(let i=0; i<40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 400 + Math.random() * 300;
        const h = 30 + Math.random() * 100;
        const building = new THREE.Mesh(
            new THREE.BoxGeometry(20, h, 20),
            new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        building.position.set(Math.cos(angle)*radius, h/2, Math.sin(angle)*radius);
        building.castShadow = true;
        scene.add(building);
    }
}

function createPorsche() {
    car = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd5001c, metalness: 0.8, roughness: 0.2 });
    
    // Base do Carro
    const body = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 16), bodyMat);
    body.position.y = 1.5;
    body.castShadow = true;
    car.add(body);

    // Cockpit
    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(7, 2, 8), new THREE.MeshStandardMaterial({color:0x111111}));
    cockpit.position.set(0, 3, -1);
    car.add(cockpit);

    // Faróis (Esferas brilhantes)
    const lightGeo = new THREE.SphereGeometry(1, 16, 16);
    const lightMat = new THREE.MeshBasicMaterial({color: 0xffffff});
    [[-3, 2, 8], [3, 2, 8]].forEach(p => {
        const l = new THREE.Mesh(lightGeo, lightMat);
        l.position.set(p[0], p[1], p[2]);
        car.add(l);
    });

    car.position.set(carPhys.x, 0, carPhys.z);
    scene.add(car);
}

/** ═══════════════════════════════════════════════════════════════
 *  LOOP DE FÍSICA E MOVIMENTO
 *  ═══════════════════════════════════════════════════════════════ */
function loop() {
    if(!game.active) return;
    requestAnimationFrame(loop);

    if(!game.paused) {
        // Aceleração e Freio
        if(keys.up) carPhys.speed += carPhys.accel;
        else if(keys.down) carPhys.speed -= carPhys.accel * 2;
        else carPhys.speed *= carPhys.friction;

        carPhys.speed = Math.max(-1, Math.min(carPhys.speed, carPhys.maxSpeed));

        // Curvas
        if(Math.abs(carPhys.speed) > 0.1) {
            let steer = 0.04;
            if(keys.left) carPhys.angle += steer;
            if(keys.right) carPhys.angle -= steer;
        }

        // Aplicar Movimento
        carPhys.x += Math.sin(carPhys.angle) * carPhys.speed;
        carPhys.z += Math.cos(carPhys.angle) * carPhys.speed;

        car.position.set(carPhys.x, 0, carPhys.z);
        car.rotation.y = carPhys.angle;

        // Câmera Seguindo (Estilo GTA)
        const camDist = 45;
        camera.position.x = carPhys.x - Math.sin(carPhys.angle) * camDist;
        camera.position.z = carPhys.z - Math.cos(carPhys.angle) * camDist;
        camera.position.y = 18;
        camera.lookAt(carPhys.x, 5, carPhys.z);

        // UI
        document.getElementById('spd-val').textContent = Math.round(Math.abs(carPhys.speed) * 92);
        checkCheckpoints();
    }
    renderer.render(scene, camera);
}

function checkCheckpoints() {
    const angle = (game.current / 10) * Math.PI * 2;
    const gx = Math.cos(angle) * 250;
    const gz = Math.sin(angle) * 250;
    const d = Math.sqrt((carPhys.x-gx)**2 + (carPhys.z-gz)**2);
    
    if(d < 60 && !game.paused) showQuestion();
}

function showQuestion() {
    game.paused = true;
    const q = DB[game.current];
    document.getElementById('q-txt').textContent = q.q;
    const opts = document.getElementById('q-opts');
    opts.innerHTML = '';
    
    q.a.forEach((o, i) => {
        const btn = document.createElement('div');
        btn.className = 'q-opt';
        btn.textContent = o;
        btn.onclick = () => {
            if(i === q.c) {
                btn.classList.add('correct');
                game.score += 10;
            } else {
                btn.classList.add('wrong');
            }
            setTimeout(() => {
                game.current++;
                if(game.current >= 10) finish();
                else {
                    document.getElementById('q-overlay').style.display = 'none';
                    document.getElementById('hud-q').textContent = `CHECKPOINT: ${game.current+1}/10`;
                    document.getElementById('hud-score').textContent = `SCORE: ${game.score}`;
                    game.paused = false;
                    carPhys.speed = 2; // Impulso
                }
            }, 1000);
        };
        opts.appendChild(btn);
    });
    document.getElementById('q-overlay').style.display = 'flex';
}

function finish() {
    game.active = false;
    document.getElementById('screen-game').style.display = 'none';
    document.getElementById('q-overlay').style.display = 'none';
    document.getElementById('screen-finish').style.display = 'flex';
    document.getElementById('fin-res').innerHTML = `PILOTO: ${document.getElementById('sel-nome').value}<br>PONTUAÇÃO: ${game.score}`;
}

/** ═══════════════════════════════════════════════════════════════
 *  SISTEMA DE CONTROLES
 *  ═══════════════════════════════════════════════════════════════ */
function setupInput() {
    window.onkeydown = (e) => { 
        if(e.key=='ArrowUp') keys.up=1; if(e.key=='ArrowDown') keys.down=1;
        if(e.key=='ArrowLeft') keys.left=1; if(e.key=='ArrowRight') keys.right=1;
    };
    window.onkeyup = (e) => { 
        if(e.key=='ArrowUp') keys.up=0; if(e.key=='ArrowDown') keys.down=0;
        if(e.key=='ArrowLeft') keys.left=0; if(e.key=='ArrowRight') keys.right=0;
    };

    const bind = (id, k) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[k]=1; };
        el.ontouchend = (e) => { e.preventDefault(); keys[k]=0; };
        el.onmousedown = () => keys[k]=1;
        el.onmouseup = () => keys[k]=0;
    };
    bind('k-up', 'up'); bind('k-down', 'down'); bind('k-left', 'left'); bind('k-right', 'right');
}

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
