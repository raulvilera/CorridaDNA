<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PORSCHE GENETIC CUP | 9º ANO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    :root { --porsche-red: #d5001c; --gold: #b2967d; --bg: #0a0a0b; }
    *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
    body{ width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:sans-serif; touch-action:none; }

    /* TELAS */
    #screen-select, #screen-game, #screen-finish { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #screen-select { background: radial-gradient(circle, #1a1a1f, #000); }
    #screen-game { display:none; pointer-events:none; }
    #screen-finish { background:rgba(0,0,0,0.9); display:none; color:#fff; z-index:100;}

    /* UI ESTILO PORSCHE */
    .porsche-logo { font-family:'Orbitron'; font-weight:900; font-size:2rem; letter-spacing:8px; color:#fff; margin-bottom:40px; text-align:center;}
    .glass-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:30px; border-radius:4px; width:90%; max-width:400px; text-align:center;}
    select { width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; margin-bottom:20px; font-family:'Orbitron'; }
    .btn-race { background:var(--porsche-red); color:#fff; border:none; padding:18px; width:100%; font-family:'Orbitron'; font-weight:900; cursor:pointer; letter-spacing:2px; }

    /* HUD NO JOGO */
    #hud { position:fixed; top:20px; left:20px; color:#fff; font-family:'Orbitron'; z-index:50; pointer-events:none;}
    .speed-ui { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); text-align:center; color:#fff; z-index:50; pointer-events:none;}
    .speed-num { font-size:3.5rem; font-weight:900; font-family:'Orbitron'; line-height:1;}

    /* CONTROLES MOBILE - CORRIGIDOS */
    #mobile-ctrl { position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:space-between; padding:0 20px; pointer-events:none; z-index:100;}
    .btn-group { display:flex; gap:15px; pointer-events:all; }
    .btn-ui { width:70px; height:70px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.2rem; font-weight:bold; }
    .btn-ui:active { background:var(--porsche-red); }

    /* QUESTÕES */
    #q-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
    .q-box { background:#111; border-top:5px solid var(--porsche-red); padding:30px; width:100%; max-width:500px; color:#fff; }
    .q-opt { border:1px solid #333; padding:15px; margin-top:10px; cursor:pointer; font-family:'Orbitron'; font-size:0.8rem; }
    .correct { background: #004411 !important; }
    .wrong { background: #440000 !important; }
</style>
</head>
<body>

<div id="screen-select">
    <div class="porsche-logo">PORSCHE</div>
    <div class="glass-card">
        <select id="sel-nome">
            <option value="">-- PILOTO --</option>
            <option value="NICOLAS PENTEADO">NICOLAS PENTEADO</option>
            <option value="YURI GABRIEL">YURI GABRIEL</option>
        </select>
        <button class="btn-race" onclick="startRace()">START ENGINE</button>
    </div>
</div>

<div id="screen-game">
    <canvas id="stage" style="position:fixed; top:0; left:0; width:100%; height:100%;"></canvas>
    <div id="hud">
        <div id="hud-q">CHECKPOINT: 1/10</div>
        <div id="hud-score" style="color:var(--gold);">SCORE: 000</div>
    </div>
    <div class="speed-ui">
        <div class="speed-num" id="spd-val">0</div>
        <div style="letter-spacing:5px; font-size:0.7rem; font-family:'Orbitron';">KM/H</div>
    </div>
    <div id="mobile-ctrl">
        <div class="btn-group">
            <div class="btn-ui" id="k-left">◀</div>
            <div class="btn-ui" id="k-right">▶</div>
        </div>
        <div class="btn-group">
            <div class="btn-ui" id="k-down" style="border-radius:10px;">BRAKE</div>
            <div class="btn-ui" id="k-up" style="border-radius:10px;">GAS</div>
        </div>
    </div>
</div>

<div id="q-overlay">
    <div class="q-box">
        <h2 id="q-txt" style="margin-bottom:20px;"></h2>
        <div id="q-opts"></div>
    </div>
</div>

<div id="screen-finish">
    <h1 class="porsche-logo">FINISH!</h1>
    <div id="fin-res" style="text-align:center; font-family:'Orbitron'; margin-bottom:30px;"></div>
    <button class="btn-race" style="width:200px;" onclick="location.reload()">RETRY</button>
</div>

<script>
const DB = [
    {q:"Onde fica o DNA em células eucariontes?", a:["Citoplasma", "Núcleo", "Ribossomo"], c:1},
    {q:"Estrutura do DNA:", a:["Hélice Simples", "Dupla Hélice", "Tripla"], c:1},
    {q:"Par da Adenina (A):", a:["Guanina", "Citosina", "Timina"], c:2},
    {q:"Cromossomos humanos (somática):", a:["23", "46", "92"], c:1},
    {q:"Unidade básica do DNA:", a:["Nucleotídeo", "Proteína", "Lípídio"], c:0},
    {q:"Técnica da Foto 51:", a:["Raios-X", "Laser", "Infravermelho"], c:0},
    {q:"Açúcar do DNA:", a:["Ribose", "Desoxirribose", "Glicose"], c:1},
    {q:"Base exclusiva do RNA:", a:["Timina", "Uracila", "Citosina"], c:1},
    {q:"Cromossomos do mesmo par:", a:["Gêmeos", "Homólogos", "Alelos"], c:1},
    {q:"Transmissão genética via:", a:["Gametas", "Suor", "Saliva"], c:0}
];

let scene, camera, renderer, car;
let keys = { up:0, down:0, left:0, right:0 };
let carPhys = { speed: 0, angle: 0, x: 350, z: 0, accel: 0.015, friction: 0.98, maxSpeed: 3.5 };
let game = { current: 0, score: 0, active: false, paused: false };

function startRace() {
    if(!document.getElementById('sel-nome').value) return;
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-game').style.display = 'block';
    init3D();
}

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('stage'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // LUZ GLOBAL (Evita tela preta)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // PISTA
    const trackGeo = new THREE.RingGeometry(170, 270, 64);
    const trackMat = new THREE.MeshStandardMaterial({ color: 0x151515 });
    const track = new THREE.Mesh(trackGeo, trackMat);
    track.scale.set(350/220, 1, 1);
    track.rotation.x = -Math.PI/2;
    scene.add(track);

    // CHÃO AUXILIAR
    scene.add(new THREE.GridHelper(2000, 40, 0x222222, 0x111111));

    createCar();
    setupInput();
    game.active = true;
    animate();
}

function createCar() {
    car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 16), new THREE.MeshStandardMaterial({color: 0xd5001c}));
    body.position.y = 1.5;
    car.add(body);
    
    // Teto
    const roof = new THREE.Mesh(new THREE.BoxGeometry(7, 2, 8), new THREE.MeshStandardMaterial({color: 0x000000}));
    roof.position.set(0, 3, -1);
    car.add(roof);

    car.position.set(carPhys.x, 0, carPhys.z);
    scene.add(car);
}

function animate() {
    if(!game.active) return;
    requestAnimationFrame(animate);

    if(!game.paused) {
        if(keys.up) carPhys.speed += carPhys.accel;
        else if(keys.down) carPhys.speed -= carPhys.accel * 2;
        else carPhys.speed *= carPhys.friction;

        carPhys.speed = Math.max(-1, Math.min(carPhys.speed, carPhys.maxSpeed));

        if(Math.abs(carPhys.speed) > 0.1) {
            let dir = carPhys.speed > 0 ? 1 : -1;
            if(keys.left) carPhys.angle += 0.04 * dir;
            if(keys.right) carPhys.angle -= 0.04 * dir;
        }

        carPhys.x += Math.sin(carPhys.angle) * carPhys.speed;
        carPhys.z += Math.cos(carPhys.angle) * carPhys.speed;

        car.position.set(carPhys.x, 0, carPhys.z);
        car.rotation.y = carPhys.angle;

        // Câmera Follow Suave
        const camDist = 45;
        camera.position.x = carPhys.x - Math.sin(carPhys.angle) * camDist;
        camera.position.z = carPhys.z - Math.cos(carPhys.angle) * camDist;
        camera.position.y = 18;
        camera.lookAt(carPhys.x, 5, carPhys.z);

        document.getElementById('spd-val').textContent = Math.round(Math.abs(carPhys.speed) * 90);
        checkCheck();
    }
    renderer.render(scene, camera);
}

function checkCheck() {
    const angle = (game.current / 10) * Math.PI * 2;
    const gx = Math.cos(angle) * 350;
    const gz = Math.sin(angle) * 220;
    const d = Math.sqrt((carPhys.x-gx)**2 + (carPhys.z-gz)**2);
    if(d < 50) showQ();
}

function showQ() {
    game.paused = true;
    const q = DB[game.current];
    document.getElementById('q-txt').textContent = q.q;
    const opts = document.getElementById('q-opts');
    opts.innerHTML = '';
    q.a.forEach((o, i) => {
        const div = document.createElement('div');
        div.className = 'q-opt';
        div.textContent = o;
        div.onclick = () => {
            if(i === q.c) { div.classList.add('correct'); game.score += 10; }
            else { div.classList.add('wrong'); }
            setTimeout(() => {
                game.current++;
                if(game.current >= 10) finish();
                else {
                    document.getElementById('q-overlay').style.display = 'none';
                    document.getElementById('hud-q').textContent = `CHECKPOINT: ${game.current+1}/10`;
                    document.getElementById('hud-score').textContent = `SCORE: ${game.score}`;
                    game.paused = false;
                    carPhys.speed = 2;
                }
            }, 1000);
        };
        opts.appendChild(div);
    });
    document.getElementById('q-overlay').style.display = 'flex';
}

function finish() {
    game.active = false;
    document.getElementById('screen-game').style.display = 'none';
    document.getElementById('q-overlay').style.display = 'none';
    document.getElementById('screen-finish').style.display = 'flex';
    document.getElementById('fin-res').innerHTML = `SCORE: ${game.score}`;
}

function setupInput() {
    window.onkeydown = (e) => { if(e.key=='ArrowUp') keys.up=1; if(e.key=='ArrowDown') keys.down=1; if(e.key=='ArrowLeft') keys.left=1; if(e.key=='ArrowRight') keys.right=1; };
    window.onkeyup = (e) => { if(e.key=='ArrowUp') keys.up=0; if(e.key=='ArrowDown') keys.down=0; if(e.key=='ArrowLeft') keys.left=0; if(e.key=='ArrowRight') keys.right=0; };
    const bind = (id, k) => { 
        const el = document.getElementById(id); 
        el.ontouchstart = (e) => { e.preventDefault(); keys[k]=1; };
        el.ontouchend = (e) => { e.preventDefault(); keys[k]=0; };
        el.onmousedown = () => keys[k]=1; 
        el.onmouseup = () => keys[k]=0; 
    };
    bind('k-up', 'up'); bind('k-down', 'down'); bind('k-left', 'left'); bind('k-right', 'right');
}
</script>
</body>
</html>
