<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIT STOP GENÉTICO 3D | Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root { --primary: #ffd000; --danger: #e8001a; --bg: #05060f; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Exo 2',sans-serif;touch-action:none;}

/* --- TELAS --- */
#screen-select, #screen-game, #screen-finish { position:fixed; inset:0; z-index:10; }
#screen-select { background:linear-gradient(160deg,#040610 0%,#0a0f28 100%); display:flex; flex-direction:column; align-items:center; overflow-y:auto; padding-bottom:40px; }
#screen-game { display:none; }
#screen-finish { background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#fff; z-index:1000;}

/* --- UI COMPONENTS --- */
.header { width:100%; background:rgba(0,0,0,0.8); border-bottom:3px solid var(--primary); padding:15px; text-align:center; }
.title { font-family:'Orbitron'; color:var(--primary); font-size:1.8rem; text-shadow: 0 0 15px rgba(255,208,0,0.5); }
.form-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,208,0,0.2); padding:25px; border-radius:20px; width:90%; max-width:500px; margin-top:20px; }
input, select { width:100%; padding:12px; margin:10px 0; background:#111; border:1px solid #444; color:#fff; border-radius:8px; font-size:1rem; }

.btn-start { background:var(--danger); color:#fff; border:none; padding:18px; width:100%; border-radius:50px; font-family:'Orbitron'; font-weight:900; cursor:pointer; box-shadow:0 5px 0 #8b0010; transition:0.1s; margin-top:15px;}
.btn-start:active { transform:translateY(4px); box-shadow:0 1px 0 #8b0010; }

/* --- HUD --- */
#hud { position:fixed; top:10px; left:10px; right:10px; pointer-events:none; display:flex; justify-content:space-between; z-index:100; }
.stats-box { background:rgba(0,0,0,0.7); border:1px solid var(--primary); padding:10px 15px; border-radius:10px; color:#fff; font-family:'Orbitron'; font-size:0.8rem; }
.speedometer { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); padding:10px 30px; border-radius:40px; border-bottom:4px solid var(--primary); color:var(--primary); font-family:'Orbitron'; text-align:center; pointer-events:none;}

/* --- CONTROLES MOBILE --- */
#controls { position:fixed; bottom:20px; width:100%; display:flex; justify-content:space-between; padding:0 30px; pointer-events:none; }
.ctrl-group { display:flex; gap:15px; pointer-events:all; }
.btn-ctrl { width:70px; height:70px; background:rgba(255,255,255,0.1); border:2px solid #fff; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.5rem; user-select:none; }
.btn-ctrl.active { background:var(--primary); color:#000; transform:scale(0.9); }
.btn-accel { background:rgba(0,255,100,0.2); border-color:#00ff64; }
.btn-brake { background:rgba(255,0,0,0.2); border-color:#ff0000; }

/* --- OVERLAY QUESTÃO --- */
#question-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:500; padding:20px; }
.q-card { background:#111420; border:2px solid var(--primary); border-radius:20px; padding:25px; width:100%; max-width:600px; box-shadow:0 0 50px rgba(0,0,0,0.5); }
.q-opt { background:rgba(255,255,255,0.05); border:1px solid #333; padding:15px; margin:10px 0; border-radius:10px; color:#fff; cursor:pointer; transition:0.2s; }
.q-opt:hover { background:rgba(255,208,0,0.1); border-color:var(--primary); }
.q-opt.correct { background:#004411; border-color:#00ff64; }
.q-opt.wrong { background:#440000; border-color:#ff0000; }
</style>
</head>
<body>

<div id="screen-select">
    <div class="header">
        <div class="title">PIT STOP GENÉTICO 3D</div>
        <p style="color:#888; font-size:0.7rem; letter-spacing:2px; margin-top:5px;">9º ANO | CIÊNCIAS</p>
    </div>
    <div class="form-card">
        <label style="color:var(--primary); font-size:0.7rem; font-family:'Orbitron';">PILOTO</label>
        <select id="sel-nome">
            <option value="">-- SELECIONE SEU NOME --</option>
            <option value="NICOLAS PENTEADO">NICOLAS PENTEADO (9º B)</option>
            <option value="YURI GABRIEL">YURI GABRIEL (9º A)</option>
        </select>
        <button class="btn-start" onclick="initGame()">LARGADA! ▶</button>
        <div style="margin-top:20px; color:#666; font-size:0.8rem; text-align:center;">
            Use as SETAS do teclado ou os botões na tela.
        </div>
    </div>
</div>

<div id="screen-game">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
        <div class="stats-box" id="hud-stats">QUESTÃO: 1/10</div>
        <div class="stats-box" id="hud-score" style="color:var(--primary)">ACERTOS: 0</div>
    </div>
    <div class="speedometer">
        <div id="spd-val">0</div>
        <div style="font-size:0.5rem">KM/H</div>
    </div>
    <div id="controls">
        <div class="ctrl-group">
            <div class="btn-ctrl" id="btn-left">◀</div>
            <div class="btn-ctrl" id="btn-right">▶</div>
        </div>
        <div class="ctrl-group">
            <div class="btn-ctrl btn-brake" id="btn-down">▼</div>
            <div class="btn-ctrl btn-accel" id="btn-up">▲</div>
        </div>
    </div>
</div>

<div id="question-overlay">
    <div class="q-card">
        <h2 id="q-text" style="color:#fff; margin-bottom:20px; font-size:1.1rem;"></h2>
        <div id="q-options"></div>
    </div>
</div>

<div id="screen-finish">
    <h1 style="color:var(--primary); font-family:'Orbitron'; font-size:3rem;">FIM DE PROVA!</h1>
    <div id="fin-result" style="font-size:1.5rem; margin:20px 0;"></div>
    <button class="btn-start" style="width:auto; padding:15px 40px;" onclick="location.reload()">RECORRER</button>
</div>

<script>
/** ═══════════════════════════════════════════════════════════════
 *  DATA & CONFIG
 *  ═══════════════════════════════════════════════════════════════ */
const QUESTIONS = [
    {q:"O que compõe a estrutura básica de um nucleotídeo?", a:["Fosfato, Açúcar e Base Nitrogenada", "Proteína e Carboidrato", "Apenas DNA"], c:0},
    {q:"Quem obteve a 'Foto 51' essencial para descobrir o DNA?", a:["James Watson", "Rosalind Franklin", "Gregor Mendel"], c:1},
    {q:"Qual base nitrogenada é exclusiva do RNA?", a:["Timina", "Uracila", "Guanina"], c:1},
    {q:"Células humanas somáticas possuem quantos cromossomos?", a:["23", "46", "92"], c:1},
    {q:"O que é um gene?", a:["Uma célula completa", "Segmento de DNA com instrução proteica", "Uma proteína do sangue"], c:1},
    {q:"Qual a forma da molécula de DNA?", a:["Círculo perfeito", "Dupla Hélice", "Linha reta"], c:1},
    {q:"Onde fica a maior parte do DNA na célula eucarionte?", a:["Citoplasma", "Ribossomo", "Núcleo"], c:2},
    {q:"O par de bases do DNA é sempre:", a:["A-U e C-G", "A-T e C-G", "A-C e T-G"], c:1},
    {q:"O que são cromátides-irmãs?", a:["Cópias idênticas do cromossomo", "Cromossomos de pais diferentes", "Mutação genética"], c:0},
    {q:"O que define o fenótipo?", a:["Apenas o DNA", "Genótipo + Meio Ambiente", "Apenas a alimentação"], c:1}
];

/** ═══════════════════════════════════════════════════════════════
 *  VARIÁVEIS DE JOGO
 *  ═══════════════════════════════════════════════════════════════ */
let scene, camera, renderer, car, track, particles = [];
let keys = { up: false, down: false, left: false, right: false };
let physics = { speed: 0, angle: 0, x: 180, z: 0, accel: 0.008, friction: 0.96, maxSpeed: 2.2, turnSpeed: 0.04 };
let gameState = { currentQ: 0, score: 0, active: false, paused: false };

// Dimensões da pista (elipse)
const TRACK_RX = 220;
const TRACK_RZ = 140;
const TRACK_WIDTH = 45;

/** ═══════════════════════════════════════════════════════════════
 *  INICIALIZAÇÃO
 *  ═══════════════════════════════════════════════════════════════ */
function initGame() {
    const nome = document.getElementById('sel-nome').value;
    if(!nome) return alert("Selecione um piloto!");

    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-game').style.display = 'block';

    setupThree();
    setupControls();
    gameState.active = true;
    animate();
}

function setupThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070a);
    scene.fog = new THREE.Fog(0x05070a, 50, 400);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    // Luzes
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(100, 200, 100);
    sun.castShadow = true;
    scene.add(sun);

    // Chão e Pista
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x0a0a0a}));
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    createTrack();
    createCar();
}

function createTrack() {
    // Pista visual
    const points = [];
    for(let i=0; i<=64; i++) {
        let a = (i/64) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a)*TRACK_RX, 0.1, Math.sin(a)*TRACK_RZ));
    }
    const trackShape = new THREE.Mesh(
        new THREE.RingGeometry(TRACK_RX - TRACK_WIDTH, TRACK_RX + TRACK_WIDTH, 64),
        new THREE.MeshStandardMaterial({ color: 0x151515, side: THREE.DoubleSide })
    );
    // Ajuste para elipse
    trackShape.scale.set(1, TRACK_RZ/TRACK_RX, 1);
    trackShape.rotation.x = -Math.PI/2;
    scene.add(trackShape);

    // Linha central
    const lineGeo = new THREE.RingGeometry(TRACK_RX - 2, TRACK_RX + 2, 64);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffd000, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.scale.set(1, TRACK_RZ/TRACK_RX, 1);
    line.rotation.x = -Math.PI/2;
    line.position.y = 0.15;
    scene.add(line);

    // Marcadores de Questão (Checkpoints)
    for(let i=0; i<10; i++) {
        let a = (i/10) * Math.PI * 2;
        const gate = new THREE.Mesh(
            new THREE.BoxGeometry(10, 20, 2),
            new THREE.MeshStandardMaterial({ color: 0xe8001a, emissive: 0xe8001a, emissiveIntensity: 0.5 })
        );
        gate.position.set(Math.cos(a)*TRACK_RX, 10, Math.sin(a)*TRACK_RZ);
        gate.lookAt(0, 10, 0);
        scene.add(gate);
    }
}

function createCar() {
    const group = new THREE.Group();
    // Corpo
    const body = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 12), new THREE.MeshStandardMaterial({color: 0xe8001a}));
    body.position.y = 1.5;
    body.castShadow = true;
    group.add(body);
    // Spoiler
    const wing = new THREE.Mesh(new THREE.BoxGeometry(7, 0.5, 3), new THREE.MeshStandardMaterial({color: 0x111111}));
    wing.position.set(0, 3, -5);
    group.add(wing);
    
    car = group;
    car.position.set(physics.x, 0, physics.z);
    scene.add(car);
}

/** ═══════════════════════════════════════════════════════════════
 *  LÓGICA DE MOVIMENTO (FÍSICA)
 *  ═══════════════════════════════════════════════════════════════ */
function updatePhysics() {
    if(gameState.paused) return;

    // Aceleração / Ré
    if(keys.up) physics.speed += physics.accel;
    else if(keys.down) physics.speed -= physics.accel * 1.5;
    else physics.speed *= physics.friction;

    physics.speed = Math.max(-physics.maxSpeed/2, Math.min(physics.speed, physics.maxSpeed));

    // Direção (Só vira se estiver movendo)
    if(Math.abs(physics.speed) > 0.1) {
        const factor = keys.down ? -1 : 1;
        if(keys.left) physics.angle += physics.turnSpeed * (physics.speed / physics.maxSpeed);
        if(keys.right) physics.angle -= physics.turnSpeed * (physics.speed / physics.maxSpeed);
    }

    // Aplicar Movimento
    physics.x += Math.sin(physics.angle) * physics.speed;
    physics.z += Math.cos(physics.angle) * physics.speed;

    // Colisão Simples com Bordas da Pista (Elipse)
    const dist = Math.sqrt(Math.pow(physics.x/TRACK_RX, 2) + Math.pow(physics.z/TRACK_RZ, 2));
    if(dist < 0.75 || dist > 1.25) {
        physics.speed *= 0.9; // Atrito da grama
        if(Math.abs(physics.speed) > 0.5) {
             // Trepidação na grama
             car.position.y = Math.random() * 0.5;
        }
    } else {
        car.position.y = THREE.MathUtils.lerp(car.position.y, 0, 0.1);
    }

    // Atualizar Objeto 3D
    car.position.x = physics.x;
    car.position.z = physics.z;
    car.rotation.y = physics.angle;

    // Inclinação visual ao girar
    car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, (keys.left ? 0.1 : keys.right ? -0.1 : 0), 0.1);

    // Câmera Follow (Suave)
    const camOffset = new THREE.Vector3(
        physics.x - Math.sin(physics.angle) * 35,
        18,
        physics.z - Math.cos(physics.angle) * 35
    );
    camera.position.lerp(camOffset, 0.1);
    camera.lookAt(physics.x, 5, physics.z);

    // Velocímetro HUD
    document.getElementById('spd-val').textContent = Math.round(Math.abs(physics.speed) * 80);

    checkCheckpoints();
}

/** ═══════════════════════════════════════════════════════════════
 *  SISTEMA DE QUESTÕES
 *  ═══════════════════════════════════════════════════════════════ */
function checkCheckpoints() {
    const anglePos = Math.atan2(physics.z, physics.x);
    const targetAngle = ((gameState.currentQ / 10) * Math.PI * 2);
    
    // Simplificado: gatilho por distância do centro do portão
    const gateX = Math.cos(targetAngle) * TRACK_RX;
    const gateZ = Math.sin(targetAngle) * TRACK_RZ;
    const d = Math.sqrt(Math.pow(physics.x - gateX, 2) + Math.pow(physics.z - gateZ, 2));

    if(d < 25 && !gameState.paused) {
        showQuestion();
    }
}

function showQuestion() {
    gameState.paused = true;
    const q = QUESTIONS[gameState.currentQ];
    const overlay = document.getElementById('question-overlay');
    const options = document.getElementById('q-options');
    
    document.getElementById('q-text').textContent = q.q;
    options.innerHTML = '';
    
    q.a.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'q-opt';
        btn.textContent = opt;
        btn.onclick = () => selectOption(i, q.c, btn);
        options.appendChild(btn);
    });
    
    overlay.style.display = 'flex';
}

function selectOption(idx, correct, element) {
    const all = document.querySelectorAll('.q-opt');
    all.forEach(b => b.style.pointerEvents = 'none');

    if(idx === correct) {
        element.classList.add('correct');
        gameState.score++;
        document.getElementById('hud-score').textContent = "ACERTOS: " + gameState.score;
    } else {
        element.classList.add('wrong');
        all[correct].classList.add('correct');
    }

    setTimeout(() => {
        document.getElementById('question-overlay').style.display = 'none';
        gameState.currentQ++;
        if(gameState.currentQ >= 10) {
            endGame();
        } else {
            document.getElementById('hud-stats').textContent = `QUESTÃO: ${gameState.currentQ + 1}/10`;
            gameState.paused = false;
            // Impulso após responder
            physics.speed = 1.5;
        }
    }, 2000);
}

function endGame() {
    gameState.active = false;
    document.getElementById('screen-game').style.display = 'none';
    document.getElementById('screen-finish').style.display = 'flex';
    document.getElementById('fin-result').innerHTML = `
        <p>Piloto completou a prova!</p>
        <p style="color:var(--primary); font-weight:900; font-size:2.5rem;">${gameState.score}0 PONTOS</p>
        <p>Acertos: ${gameState.score} de 10</p>
    `;
}

/** ═══════════════════════════════════════════════════════════════
 *  CONTROLES & LOOP
 *  ═══════════════════════════════════════════════════════════════ */
function setupControls() {
    // Teclado
    window.onkeydown = (e) => {
        if(e.key === 'ArrowUp') keys.up = true;
        if(e.key === 'ArrowDown') keys.down = true;
        if(e.key === 'ArrowLeft') keys.left = true;
        if(e.key === 'ArrowRight') keys.right = true;
    };
    window.onkeyup = (e) => {
        if(e.key === 'ArrowUp') keys.up = false;
        if(e.key === 'ArrowDown') keys.down = false;
        if(e.key === 'ArrowLeft') keys.left = false;
        if(e.key === 'ArrowRight') keys.right = false;
    };

    // Mouse/Touch (Mobile)
    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        const start = (e) => { e.preventDefault(); keys[key] = true; el.classList.add('active'); };
        const end = (e) => { e.preventDefault(); keys[key] = false; el.classList.remove('active'); };
        el.addEventListener('touchstart', start);
        el.addEventListener('touchend', end);
        el.addEventListener('mousedown', start);
        el.addEventListener('mouseup', end);
    };

    setupBtn('btn-up', 'up');
    setupBtn('btn-down', 'down');
    setupBtn('btn-left', 'left');
    setupBtn('btn-right', 'right');
}

function animate() {
    if(!gameState.active) return;
    requestAnimationFrame(animate);
    updatePhysics();
    renderer.render(scene, camera);
}

// Redimensionamento
window.addEventListener('resize', () => {
    if(camera) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});

</script>
</body>
</html>
